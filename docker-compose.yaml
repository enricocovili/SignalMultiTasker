services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - signal-network
    volumes:
      - "./ollama_data:/root/.ollama"
    # NOTE: after `docker compose up -d`, run once to pull the model:
    #   docker exec -it ollama ollama pull gemma4:e2b
    restart: unless-stopped

  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-api
    networks:
      - signal-network
    environment:
      - MODE=normal #supported modes: json-rpc, native, normal
      #- AUTO_RECEIVE_SCHEDULE=0 22 * * * #enable this parameter on demand
    volumes:
      - "./signal-cli-config:/home/.local/share/signal-cli"
    restart: unless-stopped

  email-bridge:
    build: .
    container_name: email-bridge
    networks:
      - signal-network
    depends_on:
      - signal-api
      - ollama
    environment:
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - SIGNAL_SENDER=${SIGNAL_SENDER}
      - SIGNAL_GROUP_ID=${SIGNAL_GROUP_ID}
      - SIGNAL_API_BASE=http://signal-api:8080
      - SIGNAL_DEVICE_NAME=${SIGNAL_DEVICE_NAME:-signal-multitasker}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e2b}
      - EMAIL_POLL_INTERVAL=${EMAIL_POLL_INTERVAL:-180}
      - MAX_NEW_EMAILS=${MAX_NEW_EMAILS:-10}
      - STATE_FILE=/app/state/email_state.json
    volumes:
      - "./bridge_state:/app/state"
    restart: on-failure

networks:
  signal-network:
    driver: bridge
